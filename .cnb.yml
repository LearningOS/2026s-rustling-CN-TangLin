# CI: push 到 main 分支时自动评测 + 上传分数
main:
  push:
    - docker:
        image: rust:latest
      env:
        CARGO_TERM_COLOR: always
        TZ: Asia/Shanghai
      imports: https://cnb.cool/LearningOS/OSCamp-2026S/keys/-/blob/main/rustlings-secrets.yml
      stages:
        - name: Install jq
          script: apt-get update && apt-get install -y jq

        - name: Run tests
          script: cargo test --test cicv --verbose

        - name: Extract score
          script: jq -r '.statistics.total_succeeds' .ide/result/check_result.json
          exports:
            score: SCORE

        - name: Post score to OpenCamp
          image: docker.cnb.cool/opencamp/learning-docker/send-score-to-opencamp:latest
          settings:
            COURSE_ID: $RUSTLINGS_COURSE_ID
            SCORE: $SCORE
            TOKEN: $RUSTLINGS_TOKEN

# 云开发环境: 点击"云原生开发"按钮时启动
$:
  vscode:
    - docker:
        build: .ide/Dockerfile
        image: rust:latest
      services:
        - vscode
        - docker
      stages:
        - name: Install rustlings
          script: cargo install --locked --path .
        - name: Start rustlings watch
          script: echo "Run 'rustlings watch' in terminal to start"
